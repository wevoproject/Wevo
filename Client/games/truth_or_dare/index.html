<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wevo games - Thuth or Dare</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../logo.webp" type="image/webp" />
  </head>

  <body>
    <header class="top-bar">
      <button class="icon-btn" id="burgerBtn">
        <img
          src="../../Icons/Closed_rolling_menu_icon.png"
          class="icon-accent"
          alt="Menu"
          id="burgerIcon"
          data-closed="../../Icons/Closed_rolling_menu_icon.png"
          data-open="../../Icons/Opened_rolling_menu_icon.png"
        />
      </button>

      <h1 class="app-title">Wevo</h1>

      <div class="header-actions">
        <button class="icon-btn" id="notifBtn">
          <img
            src="../../Icons/Notifications_icon.png"
            class="icon-accent"
            alt="Notifications"
          />
          <span class="notif-dot"></span>
        </button>

        <a href="../../account_settings/index.html" class="icon-btn">
          <img
            src="../../Icons/Account_icon.png"
            class="icon-accent"
            alt="Account"
          />
        </a>
      </div>
    </header>

    <aside class="side-menu" id="mainMenu">
      <a href="../../orga/index.html">Organiser</a>
      <a href="../../feed/index.html">Feed</a>
      <a href="../../pass/index.html">Pass</a>
      <a href="../../games/index.html">Games</a>
      <a href="../../contacts/index.html">Contacts</a>
    </aside>

    <aside class="side-menu right" id="notifMenu">
      <a href="../../messages/index.html">New messages</a>
      <a href="../../invitations/index.html">Invitations received</a>
      <a href="../../snotifications/index.html">See all</a>
    </aside>

    <main class="content">
      <div class="modal-overlay" id="jsonModal">
        <div class="modal-box">
          <h2>Import config's JSON file</h2>
          <p>Select a file to continue.</p>
          <button class="primary-btn" id="selectJsonBtn">Take a file</button>
        </div>
      </div>

      <div class="modal-overlay hidden" id="successModal">
        <div class="modal-box">
          <h2>Config users</h2>

          <div class="config-layout">
            <div class="config-import">
              <form id="import">
                <label class="file-label" for="config.json"
                  >Take an old config:</label
                >
                <input type="file" id="config.json" accept=".json" />
                <button type="button" class="primary-btn load-config-btn">
                  Load config
                </button>
              </form>
            </div>

            <div class="config-divider">
              <span>OR</span>
            </div>

            <div class="config-manual">
              <label for="userCount">
                How much users :
                <span id="countValue">1</span>
              </label>
              <input type="range" id="userCount" min="1" max="25" value="1" />

              <form id="usersForm">
                <div id="usersContainer"></div>
                <div id="carrousel_group"></div>
                <button type="submit" class="primary-btn create-config-btn">
                  Create config
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="game" id="game">
        <button id="random-choice-btn">New round</button>
        <div id="choice-pop-up">
          <div id="name-user"></div>
          <button id="Truth">Truth</button>
          <div id="or">or</div>
          <button id="Dare">Dare</button>
          <button type="submit" id="close-choice">Save</button>
        </div>
        <div id="you-are-gone-pop-up">
          <div id="action"></div>
          <h6>
            Note if it was too long? (five stars for the totality and zero if it
            was perfect)
          </h6>
          <div id="review">
            <div class="stars">
              <svg data-value="5" viewBox="0 0 24 24" class="star">
                <path
                  d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
              <svg data-value="4" viewBox="0 0 24 24" class="star">
                <path
                  d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
              <svg data-value="3" viewBox="0 0 24 24" class="star">
                <path
                  d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
              <svg data-value="2" viewBox="0 0 24 24" class="star">
                <path
                  d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
              <svg data-value="1" viewBox="0 0 24 24" class="star">
                <path
                  d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                />
              </svg>
            </div>
          </div>
          <button type="submit" id="quit">finish</button>
        </div>
        <button id="reset-localstorage-btn">Change config</button>
        <button id="download-config-btn">Download config</button>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="../home/index.html" class="nav-btn active">
        <img
          src="../../Icons/Home_icon.png"
          class="icon-secondary"
          alt="Home"
        />
      </a>
      <a href="../calls/index.html" class="nav-btn">
        <img
          src="../../Icons/Call_icon.png"
          class="icon-secondary"
          alt="Call"
        />
      </a>
      <a href="../messages/index.html" class="nav-btn">
        <img src="../../Icons/Chat_icon.png" class="icon-primary" alt="Chat" />
      </a>
      <a href="../wallet/index.html" class="nav-btn">
        <img
          src="../../Icons/Wallet_icon.png"
          class="icon-secondary"
          alt="Wallet"
        />
      </a>
      <a href="../groups/index.html" class="nav-btn">
        <img
          src="../../Icons/Group_icon.png"
          class="icon-secondary"
          alt="Groups"
        />
      </a>
    </nav>

    <div class="ui-alert-container" id="alerts"></div>

    <script src="script_1.js" defer></script>
    <script src="script_2.js" defer></script>
  </body>
</html>
